<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU ICD-10 Coder</title>
<style>
  :root {
    --bg: #0f1417; --panel: #161d22; --panel-2: #1c252b; --line: #2a363d;
    --ink: #e7edf0; --ink-dim: #8fa1ab; --accent: #4db6a4; --accent-dim: #2d6b61;
    --code: #7fd1c1; --warn: #d98c5f; --neg: #b5697a; --radius: 8px;
    --mono: "SF Mono","JetBrains Mono","Cascadia Code",Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  header { position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,var(--bg) 78%,transparent);
    padding:16px 20px 10px; border-bottom:1px solid var(--line); }
  .title-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  h1 { font-size:17px; font-weight:600; letter-spacing:-0.01em; margin:0; }
  .sub { font-size:12px; color:var(--ink-dim); font-family:var(--mono); }
  .tabs { display:flex; gap:6px; margin-top:12px; }
  .tab { background:var(--panel); border:1px solid var(--line); color:var(--ink-dim);
    padding:8px 16px; border-radius:99px; font-size:13px; cursor:pointer; user-select:none; }
  .tab:hover { color:var(--ink); border-color:var(--accent-dim); }
  .tab.active { background:var(--accent-dim); border-color:var(--accent); color:#fff; }
  main { padding:16px 20px 90px; max-width:960px; margin:0 auto; }
  textarea { width:100%; min-height:150px; resize:vertical; background:var(--panel);
    border:1px solid var(--line); border-radius:var(--radius); color:var(--ink);
    padding:13px 15px; font-size:15px; font-family:var(--sans); outline:none; line-height:1.55; }
  textarea:focus { border-color:var(--accent-dim); }
  textarea::placeholder { color:var(--ink-dim); }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:12px 0 4px; }
  .btn { background:var(--panel); border:1px solid var(--line); color:var(--ink);
    padding:9px 16px; border-radius:var(--radius); font-size:13px; cursor:pointer;
    font-family:var(--sans); transition:.12s; }
  .btn:hover { border-color:var(--accent-dim); }
  .btn-primary { background:var(--accent-dim); border-color:var(--accent); color:#fff; font-weight:600; }
  .btn-ghost { background:none; }
  .spacer { flex:1; }
  .hint { font-size:11px; color:var(--ink-dim); font-family:var(--mono); }
  .section-h { font-size:11px; text-transform:uppercase; letter-spacing:.07em;
    color:var(--ink-dim); font-weight:700; margin:22px 0 8px; display:flex;
    align-items:center; gap:8px; }
  .section-h .pill { background:var(--panel-2); border:1px solid var(--line);
    border-radius:99px; padding:1px 9px; font-size:11px; letter-spacing:0; text-transform:none;
    color:var(--ink-dim); font-family:var(--mono); }
  .res { border:1px solid var(--line); border-radius:var(--radius); background:var(--panel);
    padding:11px 13px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; cursor:pointer; }
  .res.neg { opacity:.72; border-style:dashed; }
  .res input[type=checkbox] { margin-top:4px; width:17px; height:17px; accent-color:var(--accent); cursor:pointer; }
  .res-main { flex:1; min-width:0; }
  .res-code { font-family:var(--mono); color:var(--code); font-weight:700; font-size:14px; }
  .res-desc { color:var(--ink); }
  .res-meta { font-size:11px; color:var(--ink-dim); font-family:var(--mono); margin-top:3px; }
  .ev { display:inline-block; background:var(--accent-dim); color:#fff; border-radius:3px;
    padding:0 5px; margin:2px 4px 0 0; font-size:11px; font-family:var(--mono); }
  .ev.negcue { background:var(--neg); }
  .score-bar { width:46px; height:5px; background:var(--panel-2); border-radius:9px; overflow:hidden; margin-top:6px; }
  .score-bar i { display:block; height:100%; background:var(--accent); }
  .empty { text-align:center; color:var(--ink-dim); padding:44px 20px; font-size:14px; }
  .output-box { margin-top:18px; }
  .output-box textarea { min-height:90px; font-family:var(--mono); font-size:13px; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  #search { flex:1; min-width:200px; background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); color:var(--ink); padding:10px 14px; font-size:15px; outline:none; }
  #search:focus { border-color:var(--accent-dim); }
  .filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .chip { background:var(--panel); border:1px solid var(--line); color:var(--ink-dim);
    padding:6px 12px; border-radius:99px; font-size:12px; cursor:pointer; user-select:none; }
  .chip:hover { border-color:var(--accent-dim); color:var(--ink); }
  .chip.active { background:var(--accent-dim); border-color:var(--accent); color:#fff; }
  table { width:100%; border-collapse:collapse; }
  thead th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-dim); font-weight:600; padding:0 12px 8px; border-bottom:1px solid var(--line); }
  tbody tr { border-bottom:1px solid var(--line); }
  tbody tr:hover { background:var(--panel); }
  td { padding:10px 12px; vertical-align:top; }
  .code { font-family:var(--mono); color:var(--code); font-weight:600; cursor:pointer; white-space:nowrap; font-size:14px; }
  .code:hover { text-decoration:underline; }
  .cat-tag { font-size:11px; color:var(--ink-dim); font-family:var(--mono); }
  mark { background:var(--accent-dim); color:#fff; border-radius:2px; padding:0 1px; }
  .count { font-size:12px; color:var(--ink-dim); font-family:var(--mono); margin-bottom:10px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--accent-dim); color:#fff; padding:10px 18px; border-radius:99px;
    font-size:13px; opacity:0; pointer-events:none; transition:.2s; z-index:100; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .hidden { display:none; }
  @media (max-width:560px){ .cat-tag{display:none;} td{padding:9px 8px;} }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>ICU ICD-10 Coder</h1>
    <span class="sub">Adult Critical Care</span>
  </div>
  <div class="tabs">
    <span class="tab active" data-tab="coder">Coder</span>
    <span class="tab" data-tab="ref">Reference list</span>
  </div>
</header>

<main>
  <!-- ══════════════ CODER TAB ══════════════ -->
  <section id="tab-coder">
    <textarea id="input" placeholder="Paste the patient's history & presentation here.  e.g.

68M admitted with septic shock secondary to E. coli UTI. Course complicated by AKI requiring CRRT, hyperkalemia, and acute hypoxic respiratory failure requiring intubation. Background CKD stage 4, type 2 diabetes, atrial fibrillation on apixaban. No evidence of GI bleed."></textarea>

    <div class="toolbar">
      <button class="btn btn-primary" id="genBtn">Generate ICD-10 list</button>
      <button class="btn btn-ghost" id="clearBtn">Clear</button>
      <span class="spacer"></span>
      <span class="hint" id="matchStat"></span>
    </div>

    <div id="results"></div>
  </section>

  <!-- ══════════════ REFERENCE TAB ══════════════ -->
  <section id="tab-ref" class="hidden">
    <div class="controls">
      <input id="search" type="text" placeholder="Search code or diagnosis…" autocomplete="off">
    </div>
    <div class="filters" id="filters"></div>
    <div class="count" id="refcount"></div>
    <table>
      <thead><tr><th style="width:110px">Code</th><th>Diagnosis</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="refempty">No matches.</div>
  </section>
</main>

<div class="toast" id="toast"></div>

/* Negation cues */
const NEG_CUES = ["no","not","without","w/o","denies","denied","negative","absent","absence",
  "never","none","ruled","resolved","unremarkable","nil","free"];

const STOP = new Set(("a an and or of the with without to in on for due unspecified other "+
  "acute chronic classified elsewhere encounter presence disorder stage type mellitus "+
  "unspec initial time").split(" "));

/* Generic modifiers — never used as standalone match keys (avoids false positives
   e.g. "(severe)" firing on unrelated text) */
const GENERIC = new Set(("severe mild moderate crisis malignant congestive reversible "+
  "uninfected complete generalized acquired congenital nonspecific grade following forms "+
  "site extent partial").split(" "));

/* ═══════════════════════════════════════════════════════════════════
   3. BUILD SEARCH INDEX  (per code -> weighted keys)
   ═══════════════════════════════════════════════════════════════════ */
function buildIndex(){
  return SEED.map(([code,desc,cat])=>{
    const keys=[];
    // parentheticals: keep ACRONYMS (weight 4) and multiword phrases (2.5);
    // drop generic single words like (severe)/(mild) that cause false positives.
    (desc.match(/\(([^)]+)\)/g)||[]).forEach(p=>{
      p.replace(/[()]/g,"").split(/[\/,]| or | e\.g\.? /).forEach(aOrig=>{
        const a=aOrig.trim().toLowerCase().replace(/\./g,"");
        if(!a || a.length<2 || a.startsWith("eg")) return;
        const isAcro=/[A-Z]{2,}/.test(aOrig.trim());
        if(isAcro) keys.push({t:a,w:4});
        else if(a.split(" ").length>=2) keys.push({t:a,w:2.5});
        else if(!GENERIC.has(a) && !STOP.has(a) && a.length>=4) keys.push({t:a,w:2}); // drug names, candidemia, etc.
      });
    });
    const main=desc.toLowerCase().replace(/\([^)]*\)/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
    const toks=main.split(" ").filter(w=>w.length>=3 && !STOP.has(w) && !GENERIC.has(w));
    // single-word diagnosis (e.g. "Hyperkalemia", "Melena") -> strong whole key
    if(toks.length===1) keys.push({t:toks[0],w:3});
    for(let i=0;i<toks.length-1;i++) keys.push({t:toks[i]+" "+toks[i+1],w:2.5});
    toks.forEach(w=>keys.push({t:w,w:1}));
    const m={}; keys.forEach(k=>{ if(!m[k.t]||m[k.t]<k.w) m[k.t]=k.w; });
    const maxScore=Object.values(m).reduce((a,b)=>a+b,0);
    return {code,desc,cat,keys:Object.entries(m).map(([t,w])=>({t,w})),maxScore};
  });
}
const INDEX=buildIndex();

   4. MATCHER
   ═══════════════════════════════════════════════════════════════════ */
function normalize(s){ return " "+s.toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim()+" "; }
function segment(raw){
  return raw.toLowerCase()
    .replace(/\b(but|however|although|though)\b/g,".")
    .split(/[.;:\n]|,/)
    .map(s=>s.trim()).filter(Boolean);
}
function esc4re(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function segIsNegated(seg,keyAnchor){
  const idx=seg.indexOf(keyAnchor);
  if(idx<0) return false;
  const before=" "+seg.slice(0,idx)+" ";
  return NEG_CUES.some(c=>new RegExp("\\b"+esc4re(c)+"\\b").test(before));
}
function hasPhrase(hay,phrase){
  return new RegExp("(^|[^a-z0-9])"+esc4re(phrase)+"([^a-z0-9]|$)").test(hay);
}
function match(raw){
  if(!raw.trim()) return {hits:[],negated:[]};
  let hay=normalize(raw), expanded=hay;
  Object.entries(SYN).forEach(([alias,canon])=>{ if(hasPhrase(hay,alias)) expanded+=" "+canon+" "; });
  const segs=segment(raw);
  const segExp=segs.map(s=>{
    let e=" "+s+" ";
    Object.entries(SYN).forEach(([alias,canon])=>{ if(hasPhrase(" "+s+" ",alias)) e+=" "+canon+" "; });
    return e;
  });
  const results=[];
  INDEX.forEach(entry=>{
    let score=0; const ev=new Set();
    entry.keys.forEach(k=>{ if(hasPhrase(expanded,k.t)){ score+=k.w; ev.add(k.t); } });
    if(score<2) return;
    const anchor=[...ev].sort((a,b)=>b.length-a.length)[0];
    let negated=false, seenPositive=false;
    segExp.forEach(se=>{
      if(hasPhrase(se,anchor)){
        if(segIsNegated(se,anchor)) negated=true; else seenPositive=true;
      }
    });
    if(!seenPositive && !negated) seenPositive=true;
    const conf=Math.min(100,Math.round(100*score/Math.max(entry.maxScore,4)));
    results.push({...entry,score,conf,ev:[...ev],negated:negated&&!seenPositive});
  });
  const byCode={};
  results.forEach(r=>{ if(!byCode[r.code]||byCode[r.code].score<r.score) byCode[r.code]=r; });
  const all=Object.values(byCode).sort((a,b)=>b.score-a.score||a.code.localeCompare(b.code));
  return { hits:all.filter(r=>!r.negated), negated:all.filter(r=>r.negated) };
}

/* ═══════════════════════════════════════════════════════════════════
   5. CODER UI
   ═══════════════════════════════════════════════════════════════════ */
const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function generate(){
  const raw=$("input").value;
  const {hits,negated}=match(raw);
  const box=$("results");
  if(!raw.trim()){ box.innerHTML=`<div class="empty">Paste a clinical summary above, then press <strong>Generate</strong>.</div>`; $("matchStat").textContent=""; return; }
  if(!hits.length && !negated.length){ box.innerHTML=`<div class="empty">No codes matched. Try adding more clinical detail, or search the Reference list.</div>`; $("matchStat").textContent="0 matches"; return; }
  const strong=hits.filter(h=>h.conf>=45);
  const maybe=hits.filter(h=>h.conf<45);
  const rowHtml=(r,checked,cls="")=>`
    <label class="res ${cls}">
      <input type="checkbox" data-code="${esc(r.code)}" data-desc="${esc(r.desc)}" ${checked?"checked":""}>
      <div class="res-main">
        <span class="res-code">${esc(r.code)}</span> &nbsp;<span class="res-desc">${esc(r.desc)}</span>
        <div class="res-meta">${esc(r.cat)}</div>
        <div>${r.ev.slice(0,6).map(e=>`<span class="ev${cls==='neg'?' negcue':''}">${esc(e)}</span>`).join("")}</div>
        <div class="score-bar"><i style="width:${r.conf}%"></i></div>
      </div>
    </label>`;
  let html="";
  if(strong.length){ html+=`<div class="section-h">Suggested codes <span class="pill">${strong.length}</span></div>`+strong.map(r=>rowHtml(r,true)).join(""); }
  if(maybe.length){ html+=`<div class="section-h">Possible — review <span class="pill">${maybe.length}</span></div>`+maybe.map(r=>rowHtml(r,false)).join(""); }
  if(negated.length){ html+=`<div class="section-h">Mentioned but negated — not selected <span class="pill">${negated.length}</span></div>`+negated.map(r=>rowHtml(r,false,"neg")).join(""); }
  html+=`
    <div class="toolbar" style="margin-top:18px">
      <button class="btn btn-primary" id="copyBtn">Copy selected</button>
      <button class="btn" id="csvBtn">Download CSV</button>
      <button class="btn btn-ghost" id="allBtn">Select all</button>
      <button class="btn btn-ghost" id="noneBtn">Clear selection</button>
    </div>
    <div class="output-box hidden" id="outBox"><textarea id="outText" readonly></textarea></div>`;
  box.innerHTML=html;
  $("matchStat").textContent=`${hits.length} match${hits.length!==1?"es":""}${negated.length?` · ${negated.length} negated`:""}`;
  $("copyBtn").onclick=copySelected;
  $("csvBtn").onclick=downloadCSV;
  $("allBtn").onclick=()=>box.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=true);
  $("noneBtn").onclick=()=>box.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);
}
function selected(){
  return [...document.querySelectorAll('#results input[type=checkbox]:checked')]
    .map(c=>({code:c.dataset.code,desc:c.dataset.desc}));
}
function copySelected(){
  const sel=selected(); if(!sel.length){ toast("Nothing selected"); return; }
  const text=sel.map(s=>`${s.code} — ${s.desc}`).join("\n");
  $("outBox").classList.remove("hidden"); $("outText").value=text;
  navigator.clipboard.writeText(text).then(()=>toast(`Copied ${sel.length} codes`))
    .catch(()=>{$("outText").select();document.execCommand("copy");toast(`Copied ${sel.length} codes`);});
}
function downloadCSV(){
  const sel=selected(); if(!sel.length){ toast("Nothing selected"); return; }
  const csv="ICD-10 Code,Description\n"+sel.map(s=>`"${s.code}","${s.desc.replace(/"/g,'""')}"`).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="icd10-problem-list.csv"; a.click(); toast(`Exported ${sel.length} codes`);
}
$("genBtn").onclick=generate;
$("clearBtn").onclick=()=>{$("input").value="";$("results").innerHTML=initEmpty();$("matchStat").textContent="";$("input").focus();};
$("input").addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") generate(); });

/* ═══════════════════════════════════════════════════════════════════
   6. REFERENCE TAB
   ═══════════════════════════════════════════════════════════════════ */
let activeFilter="All";
const refData=(()=>{const m={};SEED.forEach(([code,desc,cat])=>{if(!m[code])m[code]={code,desc,cat};});return Object.values(m);})();
function categories(){return ["All",...[...new Set(refData.map(d=>d.cat))].sort()];}
function hl(text,q){ if(!q)return esc(text); const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return esc(text); return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length)); }
function renderRef(){
  const q=$("search").value.trim(), ql=q.toLowerCase();
  let rows=refData.slice();
  if(activeFilter!=="All") rows=rows.filter(r=>r.cat===activeFilter);
  if(ql) rows=rows.filter(r=>r.code.toLowerCase().includes(ql)||r.desc.toLowerCase().includes(ql));
  rows.sort((a,b)=>a.code.localeCompare(b.code));
  $("tbody").innerHTML=rows.map(r=>`<tr>
    <td><span class="code" data-copy="${esc(r.code)}">${hl(r.code,q)}</span></td>
    <td>${hl(r.desc,q)}<br><span class="cat-tag">${esc(r.cat)}</span></td></tr>`).join("");
  $("refempty").classList.toggle("hidden",rows.length>0);
  $("refcount").textContent=`${rows.length} of ${refData.length} codes`+(activeFilter!=="All"?` · ${activeFilter}`:"");
  $("filters").innerHTML=categories().map(c=>`<span class="chip${c===activeFilter?' active':''}" data-cat="${esc(c)}">${esc(c)}</span>`).join("");
  $("filters").querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{activeFilter=ch.dataset.cat;renderRef();});
  $("tbody").querySelectorAll("[data-copy]").forEach(el=>el.onclick=()=>{
    navigator.clipboard.writeText(el.dataset.copy).then(()=>toast("Copied "+el.dataset.copy));});
}
$("search").addEventListener("input",renderRef);

/* Tabs */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const tab=t.dataset.tab;
  $("tab-coder").classList.toggle("hidden",tab!=="coder");
  $("tab-ref").classList.toggle("hidden",tab!=="ref");
  if(tab==="ref") renderRef();
});

/* Toast + init */
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1400);}
function initEmpty(){return `<div class="empty">Paste a clinical summary above, then press <strong>Generate</strong>.</div>`;}
$("results").innerHTML=initEmpty();
</script>
</body>
